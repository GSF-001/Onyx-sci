version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: onyx_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onyx_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-onyx_prod}
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-onyx_user} -d ${POSTGRES_DB:-onyx_prod}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - onyx_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onyx_api_prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-onyx_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-onyx_prod}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/log/onyx:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: always
    networks:
      - onyx_network

  nginx:
    image: nginx:alpine
    container_name: onyx_nginx_prod
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./artifacts/oasis-research/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: always
    networks:
      - onyx_network

volumes:
  postgres_data_prod:
    driver: local

networks:
  onyx_network:
    driver: bridge
