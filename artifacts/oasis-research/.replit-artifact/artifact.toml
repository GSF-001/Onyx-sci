kind = "web"
previewPath = "/"
title = "OASIS Research"
version = "1.0.0"
id = "artifacts/oasis-research"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25209

[services.development]
run = "pnpm --filter @workspace/oasis-research run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oasis-research", "run", "build" ]
publicDir = "artifacts/oasis-research/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25209"
BASE_PATH = "/"
